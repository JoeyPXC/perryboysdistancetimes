<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Times Unified Index</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: var(--text-color); padding: 2rem 1rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { margin-bottom: 2.5rem; text-align: center; border-bottom: 3px solid var(--primary-color); padding-bottom: 1.5rem; }
        h1 { color: var(--primary-color); margin-bottom: 0.5rem; font-size: 2.4rem; letter-spacing: -0.05em; }
        p { color: #64748b; font-size: 1.1rem; }

        /* Search Controls */
        .search-container { display: grid; grid-template-columns: 3fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        input[type="text"] { width: 100%; padding: 0.9rem 1.2rem; border: 2px solid var(--border-color); border-radius: 6px; font-size: 1.05rem; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--secondary-color); }
        .stats-badge { background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; font-size: 1rem; }

        /* Athlete Profile Cards */
        .athlete-card { background: var(--card-bg); border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 2rem; overflow: hidden; }
        .athlete-header { background: #f1f5f9; padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); }
        .athlete-name { font-size: 1.4rem; font-weight: 800; color: var(--primary-color); text-transform: uppercase; }
        .entry-count { background: var(--secondary-color); color: white; font-size: 0.85rem; font-weight: bold; padding: 0.3rem 0.75rem; border-radius: 4px; }

        /* Performance Records Table */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 0.85rem 1.5rem; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 700; color: #475569; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f1f5f9; }
        
        .mark-display { font-family: "SFMono-Regular", Consolas, monospace; font-size: 1.1rem; font-weight: 700; color: var(--secondary-color); }

        /* State Modals */
        .loading-state { text-align: center; padding: 4rem; font-size: 1.3rem; font-weight: 600; color: var(--secondary-color); }
        .error-state { background: #fee2e2; color: #991b1b; padding: 1.2rem; border-radius: 6px; margin-bottom: 2rem; border: 1px solid #fca5a5; font-weight: 500; }
        
        @media (max-width: 768px) {
            .search-container { grid-template-columns: 1fr; }
            th, td { padding: 0.6rem 0.75rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Distance Times Unified Index</h1>
        <p>The Master Hub for All Active Track Logs and Historical XC Seasons</p>
    </header>

    <div id="errors"></div>

    <div class="search-container">
        <input type="text" id="search-bar" placeholder="Search by runner name, graduation year, or track/XC meet..." disabled>
        <div class="stats-badge" id="counter-badge">Syncing Feeds...</div>
    </div>

    <div id="index-output">
        <div class="loading-state">Connecting to active document pipelines and filtering 3200m tracks...</div>
    </div>
</div>

<script>
    // --- 1. SPREADSHEET URL INTEGRATION ---
    // Update the URLs inside the single quotes below with your live, published Google Sheets CSV links.
    const FEED_URLS = {
        trackDoc1: 'YOUR_TRACK_SHEET_1_CSV_URL',
        trackDoc2: 'YOUR_TRACK_SHEET_2_CSV_URL',
        trackDoc3: 'YOUR_TRACK_SHEET_3_CSV_URL',
        trackDoc4: 'YOUR_TRACK_SHEET_4_CSV_URL',
        // This links directly to your newly added published historical XC file:
        historicalXC: 'YOUR_PUBLISHED_BOYS_XC_SPREADSHEET_CSV_URL' 
    };

    let DATABASE = [];

    // --- 2. ENGINE COUPLING ---
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            await compileDataFeeds();
            wireSearchEngine();
        } catch (err) {
            displayError(`Data pipeline connection failure: ${err.message}`);
        }
    });

    // --- 3. DATA HARVESTING & PARSING PIPELINE ---
    async function compileDataFeeds() {
        const fetchJobs = [];

        // Stack the 4 core track documents
        ['trackDoc1', 'trackDoc2', 'trackDoc3', 'trackDoc4'].forEach(key => {
            if(FEED_URLS[key] && !FEED_URLS[key].includes('YOUR_')) {
                fetchJobs.push(fetchStandardTrack(FEED_URLS[key], 'Track Log'));
            }
        });

        // Stack the historical cross country spreadsheet tab stream
        if(FEED_URLS.historicalXC && !FEED_URLS.historicalXC.includes('YOUR_')) {
            fetchJobs.push(fetchXCRecords(FEED_URLS.historicalXC));
        }

        // Generate clean demo data if variables haven't been replaced yet
        if(fetchJobs.length === 0) {
            loadDemoWorkspace();
        } else {
            const datasets = await Promise.all(fetchJobs);
            DATABASE = datasets.flat();
        }

        // Keep index clean: Sort descending by Year, then ascending by performance Time
        DATABASE.sort((a, b) => b.year - a.year || String(a.time).localeCompare(String(b.time)));
        refreshCounterDisplay();
    }

    async function fetchStandardTrack(url, sourceLabel) {
        const res = await fetch(url);
        const csv = await res.text();
        return parseTrackCSV(csv, sourceLabel);
    }

    // Historical Processing Engine for "Boys XC Season Spreadsheets"
    async function fetchXCRecords(url) {
        const res = await fetch(url);
        const csv = await res.text();
        
        let compiledRows = [];
        const lines = csv.split(/\r?\n/);
        if (lines.length < 2) return [];

        const headers = parseCSVLine(lines[0]);
        let documentYear = 2025; // Default target season mapping variable[cite: 2]

        for(let i = 1; i < lines.length; i++) {
            if(!lines[i].trim()) continue;
            const row = parseCSVLine(lines[i]);
            let rawName = row[0] || '';
            
            if(!rawName || rawName.toLowerCase().includes('meet') || rawName.toLowerCase().includes('weather')) continue[cite: 2].

            // Step A: Name Cleaning - Removes grade designation levels (e.g., "/11", "/12")[cite: 2]
            let cleanName = rawName.split('/')[0].trim();

            for(let j = 1; j < row.length; j++) {
                let currentMeet = headers[j] || `Meet Column ${j}`;
                let performanceMark = (row[j] || '').trim();

                // Step B: Filter out non-running values (DNR, DNF, Empty)[cite: 2]
                if(!performanceMark || ['dnr', 'dnf', 'dns', '-'].includes(performanceMark.toLowerCase())) continue[cite: 2].

                // Step C: 3200m Smart Filter Gatekeeper - Automatically drops short courses/track loops[cite: 2]
                if (isTimeUnder3200mThreshold(performanceMark, 13, 30)) {
                    continue; 
                }

                compiledRows.push({
                    athlete: cleanName,
                    year: documentYear,
                    meet: currentMeet,
                    time: performanceMark,
                    type: '5K (XC)',
                    source: 'XC Spreadsheets'
                });
            }
        }
        return compiledRows;
    }

    // Mathematical evaluation evaluating if a string falls beneath 13:30 threshold limits
    function isTimeUnder3200mThreshold(timeStr, limitMins, limitSecs) {
        const segments = timeStr.replace(/[^0-9:]/g, '').split(':');
        if(segments.length < 2) return false;
        
        const minutes = parseInt(segments[0], 10);
        const seconds = parseFloat(segments[1]);
        
        const runtimeSeconds = (minutes * 60) + seconds;
        const limitSeconds = (limitMins * 60) + limitSecs;
        
        return runtimeSeconds < limitSeconds;
    }

    function parseTrackCSV(text, sourceLabel) {
        const lines = text.split(/\r?\n/);
        let items = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            if(cols.length < 4) continue;
            items.push({
                athlete: cols[0].split('/')[0].trim(),
                year: parseInt(cols[1]) || 2026,
                meet: cols[2],
                time: cols[3],
                type: cols[4] || 'Track Event',
                source: sourceLabel
            });
        }
        return items;
    }

    function parseCSVLine(line) {
        let cells = [];
        let inQuotes = false;
        let currentCell = '';
        for (let i = 0; i < line.length; i++) {
            let char = line[i];
            if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { cells.push(currentCell.trim()); currentCell = ''; }
            else { currentCell += char; }
        }
        cells.push(currentCell.trim());
        return cells;
    }

    // Mock data profiles used to showcase functionality before links are configured
    function loadDemoWorkspace() {
        DATABASE = [
            { athlete: "Justus Detter", year: 2025, meet: "Federal League Meet", time: "15:49", type: "5K (XC)", source: "XC Spreadsheets" }[cite: 2],
            { athlete: "Justus Detter", year: 2025, meet: "Ashland Invitational", time: "15:50", type: "5K (XC)", source: "XC Spreadsheets" }[cite: 2],
            { athlete: "Jayden Simonson", year: 2025, meet: "GlenOak Invitational", time: "16:27", type: "5K (XC)", source: "XC Spreadsheets" }[cite: 2],
            { athlete: "Jayden Simonson", year: 2025, meet: "Federal League Meet", time: "16:03", type: "5K (XC)", source: "XC Spreadsheets" }[cite: 2],
            { athlete: "Liam Hogan", year: 2025, meet: "GlenOak Invitational", time: "18:40", type: "5K (XC)", source: "XC Spreadsheets" }[cite: 2],
            { athlete: "Justus Detter", year: 2026, meet: "State Indoor Championship", time: "4:22.15", type: "1600m (Track)", source: "Track Log" },
            { athlete: "Jayden Simonson", year: 2026, meet: "Dave Clegg Invitational", time: "9:32.40", type: "3200m (Track)", source: "Track Log" }
        ];
    }

    // --- 4. GRAPHICAL USER INTERFACE ---
    function renderMainView(records) {
        const viewContainer = document.getElementById('index-output');
        if (records.length === 0) {
            viewContainer.innerHTML = '<div style="text-align:center; padding: 4rem; color: #64748b; font-size: 1.1rem;">No match found inside index query boundaries.</div>';
            return;
        }

        // Grouping the matching flat matrix back under athlete key signatures
        const groupedByRunner = records.reduce((groups, item) => {
            if (!groups[item.athlete]) groups[item.athlete] = [];
            groups[item.athlete].push(item);
            return groups;
        }, {});

        let htmlString = '';
        for (const runner in groupedByRunner) {
            const list = groupedByRunner[runner];
            htmlString += `
                <div class="athlete-card">
                    <div class="athlete-header">
                        <span class="athlete-name">${runner}</span>
                        <span class="entry-count">${list.length} Mark(s)</span>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 10%;">Year</th>
                                    <th style="width: 40%;">Meet Description</th>
                                    <th style="width: 20%;">Official Time</th>
                                    <th style="width: 15%;">Event Class</th>
                                    <th style="width: 15%;">Data Source</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${list.map(entry => `
                                    <tr>
                                        <td><strong>${entry.year}</strong></td>
                                        <td>${entry.meet}</td>
                                        <td class="mark-display">${entry.time}</td>
                                        <td><span style="font-weight: 500;">${entry.type}</span></td>
                                        <td style="color: #64748b; font-size: 0.85rem;">${entry.source}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        viewContainer.innerHTML = htmlString;
    }

    function wireSearchEngine() {
        const inputField = document.getElementById('search-bar');
        inputField.disabled = false;
        
        renderMainView(DATABASE);

        inputField.addEventListener('input', (event) => {
            const query = event.target.value.toLowerCase().trim();
            if(!query) {
                renderMainView(DATABASE);
                refreshCounterDisplay(DATABASE.length);
                return;
            }

            const hits = DATABASE.filter(entry => 
                entry.athlete.toLowerCase().includes(query) ||
                entry.meet.toLowerCase().includes(query) ||
                entry.year.toString().includes(query) ||
                entry.type.toLowerCase().includes(query)
            );
            
            renderMainView(hits);
            refreshCounterDisplay(hits.length, true);
        });
    }

    function refreshCounterDisplay(amount = DATABASE.length, searching = false) {
        const badge = document.getElementById('counter-badge');
        badge.innerText = searching ? `Matches: ${amount}` : `Total Times Indexed: ${amount}`;
    }

    function displayError(message) {
        document.getElementById('errors').innerHTML = `<div class="error-state">${message}</div>`;
        const output = document.getElementById('index-output');
        if(output) output.innerHTML = '';
    }
</script>

</body>
</html>
